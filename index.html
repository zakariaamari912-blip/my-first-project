<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحتي الأولى</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            background-color: #0a192f;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background-color: white;
            color: #333;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 500px;
            animation: fadeIn 1s ease-in;
        }

        button {
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        button:hover {
            transform: scale(1.1);
            background-color: #34495e;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="my-photo.jpg" alt="صورة زكرياء" style="width: 150px; border-radius: 50%;">
        <h1>مرحبا، أنا زكرياء</h1>
        <p>مطور ويب مبتدئ وطموح. أتعلم البرمجة لأبني مستقبلي الرقمي.</p>
<button onclick="changeButtonText()">تواصل معي</button>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <a href="https://www.instagram.com/zakaria_webdev" target="_blank" style="text-decoration: none; color: white; font-size: 18px; font-weight: bold;">
            <i class="fab fa-instagram"></i> تحدث معي عبر إنستغرام
        </a>
    </div>

</body><script>
        // 1. رسالة ترحيبية ملي كيتحل الموقع
        window.onload = function() {
            console.log("مرحباً بك في موقع زكرياء!");
        };

        // 2. دالة (Function) كتغير النص ديال الزر ملي نكليكيوا عليه
        function changeButtonText() {
            const btn = document.querySelector('button');
            btn.innerText = "تم الإرسال بنجاح!";
            btn.style.backgroundColor = "#27ae60"; // كيولي خضر
        }
    </script>
</body>
</html>
</html>
